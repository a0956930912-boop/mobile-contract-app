<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手機回收契約產生器</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心庫 (獨立執行版，完全不需 import) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 翻譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入掃描套件 -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* 防止簽名時網頁跟著捲動 */
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased">
  <div id="root"></div>

  <!-- 注意這裡必須是 text/babel 才能讓瀏覽器執行 React 語法 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 (全部改為內建 SVG，不需要外部匯入) ---
    const IconSmartphone = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
    const IconScanLine = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 7 3 3 7 3"></polyline><polyline points="17 3 21 3 21 7"></polyline><polyline points="21 17 21 21 17 21"></polyline><polyline points="7 21 3 21 3 17"></polyline><line x1="7" y1="12" x2="17" y2="12"></line></svg>;
    const IconCamera = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
    const IconPenTool = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
    const IconFileCheck = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="9 15 11 17 15 11"></polyline></svg>;
    const IconDownload = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const IconX = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconAlertTriangle = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconCheckCircle = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 10 0 1-5.93 9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconLoader = ({ size = 24, className = "" }) => <svg width={size} height={size} className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

    // --- 主程式開始 ---
    function App() {
      const [step, setStep] = useState(1);
      const [formData, setFormData] = useState({
        storeName: '立方通訊', name: '', phone: '', idNumber: '', brand: '', model: '', imei: '', amount: ''
      });
      const [images, setImages] = useState({ idFront: null, idBack: null, signature: null });
      const [showScanner, setShowScanner] = useState(false);
      const [showSignature, setShowSignature] = useState(false);
      const [previewDataUrl, setPreviewDataUrl] = useState(null);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [isGenerating, setIsGenerating] = useState(false);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleImageUpload = (e, type) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setImages(prev => ({ ...prev, [type]: event.target.result }));
          reader.readAsDataURL(file);
        }
      };

      const parseAmount = (amountStr) => {
        const amount = parseInt(amountStr, 10);
        if (isNaN(amount)) return { wan: '', qian: '', bai: '' };
        return {
          wan: Math.floor(amount / 10000) > 0 ? Math.floor(amount / 10000).toString() : '',
          qian: Math.floor((amount % 10000) / 1000).toString(),
          bai: Math.floor((amount % 1000) / 100).toString()
        };
      };

      const loadImage = (src) => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      };

      // 穩定版下載邏輯 (改用 fetch Blob 避免二進位轉換亂碼)
      const handleDownloadClick = async () => {
        if (!previewDataUrl) return;
        
        let fileName = `手機回收契約_${new Date().getTime()}.jpg`;
        if (formData.imei) fileName = `${formData.imei.slice(-6)}.jpg`;
        
        try {
          const res = await fetch(previewDataUrl);
          const blob = await res.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = blobUrl;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(blobUrl);
          document.body.removeChild(a);
        } catch (e) {
          const a = document.createElement('a');
          a.href = previewDataUrl;
          a.download = fileName;
          a.click();
        }
      };

      // 完成回收：清空資料
      const executeReset = () => {
        setFormData(prev => ({
          ...prev, 
          name: '', phone: '', idNumber: '', brand: '', model: '', imei: '', amount: ''
        }));
        setImages({ idFront: null, idBack: null, signature: null });
        setPreviewDataUrl(null);
        setShowResetConfirm(false);
        setStep(1);
      };

      // 全自動畫布產生器
      const generatePreview = async () => {
        setIsGenerating(true); 
        await new Promise(resolve => setTimeout(resolve, 50)); 
        
        try {
          const canvas = document.createElement('canvas');
          canvas.width = 1240; 
          canvas.height = 1754; 
          const ctx = canvas.getContext('2d');
          
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#000000';
          const paddingLeft = 100;

          // 標題 (使用系統預設字體，防止亂碼)
          ctx.font = 'bold 50px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText('買 賣 契 約 書', canvas.width / 2, 180);

          ctx.font = '28px sans-serif';
          ctx.textAlign = 'left';

          const drawLineWithData = (label, data, x, y, lineLength) => {
            ctx.fillText(label, x, y);
            const labelWidth = ctx.measureText(label).width;
            const startLineX = x + labelWidth + 10;
            if (data) {
              ctx.textAlign = 'center';
              ctx.fillText(data, startLineX + lineLength / 2, y - 2);
              ctx.textAlign = 'left';
            }
            ctx.beginPath();
            ctx.moveTo(startLineX, y + 5);
            ctx.lineTo(startLineX + lineLength, y + 5);
            ctx.lineWidth = 2;
            ctx.stroke();
            return startLineX + lineLength + 20; 
          };

          // --- 第 1 行 ---
          let currentX = paddingLeft;
          currentX = drawLineWithData('茲本人', formData.name, currentX, 300, 160);
          currentX = drawLineWithData('所有品牌', formData.brand, currentX, 300, 220);
          drawLineWithData('型號', formData.model, currentX, 300, 260);

          // --- 第 2 行 ---
          drawLineWithData('序號', formData.imei, paddingLeft, 400, 900);

          // --- 條文 ---
          let contentY = 520;
          let lineGap = 70;
          const storeLabel = formData.storeName || '    ';
          ctx.fillText(`  本人確實讓渡無訛，保證來源正常，為個人所有，自即日起交由 ${storeLabel} 管理，`, paddingLeft, contentY);
          ctx.fillText('嗣後如有衍生民、刑事、及其糾紛等情事，概由本人負全責且放棄先訴抗辯權，並與貴', paddingLeft, contentY + lineGap);
          ctx.fillText('公司無關，', paddingLeft, contentY + lineGap * 2);
          ctx.fillText('口說無憑，特立此據為證', paddingLeft, contentY + lineGap * 3);

          ctx.fillText('此致', paddingLeft, contentY + lineGap * 4 + 40);
          ctx.fillText('    台照', paddingLeft, contentY + lineGap * 5 + 40);

          // --- 金額 ---
          const parsedAmount = parseAmount(formData.amount);
          currentX = paddingLeft + 100;
          currentX = drawLineWithData('交易金額（新台幣）：', parsedAmount.wan, currentX, 1020, 80);
          currentX = drawLineWithData('萬', parsedAmount.qian, currentX, 1020, 80);
          currentX = drawLineWithData('仟', parsedAmount.bai, currentX, 1020, 80);
          ctx.fillText('佰元整', currentX, 1020);

          // --- 簽名人 ---
          const signerInfoX = 700;
          ctx.fillText('立切結人：', signerInfoX, 1140);
          if (images.signature) {
            const sigImg = await loadImage(images.signature);
            ctx.drawImage(sigImg, signerInfoX + 140, 1060, 250, 100); 
          }
          ctx.fillText(`身份證字號： ${formData.idNumber}`, signerInfoX, 1210);
          ctx.fillText(`電話： ${formData.phone}`, signerInfoX, 1280);

          // --- 日期 ---
          const today = new Date();
          const rocYear = (today.getFullYear() - 1911).toString();
          const month = (today.getMonth() + 1).toString();
          const day = today.getDate().toString();

          currentX = paddingLeft + 150;
          currentX = drawLineWithData('中華民國', rocYear, currentX, 1340, 80);
          currentX = drawLineWithData('年', month, currentX, 1340, 60);
          currentX = drawLineWithData('月', day, currentX, 1340, 60);
          ctx.fillText('日', currentX, 1340);

          // --- 身分證與超淡浮水印 ---
          const drawIDCard = async (src, x, y, label) => {
            const w = 420; const h = 260;
            ctx.setLineDash([10, 10]); ctx.strokeStyle = '#999999'; ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h); ctx.setLineDash([]); 

            if (src) {
              const img = await loadImage(src);
              ctx.drawImage(img, x, y, w, h);

              ctx.save(); 
              ctx.translate(x + w / 2, y + h / 2);
              ctx.rotate(-30 * Math.PI / 180); 

              ctx.font = 'bold 45px sans-serif';
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

              // 超淡浮水印設定 (白邊0.2 / 紅字0.12)
              ctx.lineWidth = 6;
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
              ctx.strokeText("回收設備專用", 0, 0);

              ctx.fillStyle = 'rgba(255, 0, 0, 0.12)'; 
              ctx.fillText("回收設備專用", 0, 0);
              ctx.restore(); 
            } else {
              ctx.fillStyle = '#999999'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText(label, x + w / 2, y + h / 2);
              ctx.fillStyle = '#000000'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
            }
          };

          await drawIDCard(images.idFront, paddingLeft + 50, 1420, '身分證正面放置區');
          await drawIDCard(images.idBack, paddingLeft + 550, 1420, '身分證反面放置區');

          setPreviewDataUrl(canvas.toDataURL('image/jpeg', 0.9));
          setStep(2);

        } catch (error) {
          alert("處理圖片時發生錯誤！\n" + error.message);
        } finally {
          setIsGenerating(false); 
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 text-gray-800 pb-20 font-sans">
          <header className="bg-blue-600 text-white p-4 sticky top-0 z-10 shadow-md relative">
            <h1 className="text-xl font-bold text-center flex items-center justify-center gap-2">
              <IconSmartphone size={24} />
              手機回收契約產生器
            </h1>
          </header>

          <main className="max-w-lg mx-auto p-4 mt-2">
            {step === 1 && (
              <div className="space-y-6">
                
                <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">1</span>店家資訊
                  </h2>
                  <input type="text" name="storeName" value={formData.storeName} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：某某通訊行" />
                </section>

                <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">2</span>客戶基本資料
                  </h2>
                  <div className="space-y-4">
                    <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="姓名" />
                    <input type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="聯絡電話" />
                    <input type="text" name="idNumber" value={formData.idNumber} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="身分證字號" />
                  </div>
                </section>

                <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">3</span>回收裝置資料
                  </h2>
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <input type="text" name="brand" value={formData.brand} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="廠牌" />
                      <input type="text" name="model" value={formData.model} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="型號" />
                    </div>
                    <div className="flex gap-2">
                      <input type="text" name="imei" value={formData.imei} onChange={handleInputChange} className="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="IMEI (或序號)" />
                      <button onClick={() => setShowScanner(true)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-lg border border-gray-300 flex items-center justify-center transition">
                        <IconScanLine size={20} />
                      </button>
                    </div>
                    <div>
                      <input type="number" name="amount" value={formData.amount} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="交易金額 (數字)" />
                    </div>
                  </div>
                </section>

                <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">4</span>附件與簽名
                  </h2>
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div className="border border-dashed border-gray-300 rounded-lg p-2 flex flex-col items-center justify-center text-center relative overflow-hidden h-32 bg-gray-50">
                        {images.idFront ? <img src={images.idFront} className="absolute inset-0 w-full h-full object-cover opacity-80" /> : <IconCamera size={24} />}
                        <label className="relative z-10 bg-white/90 px-3 py-1 mt-2 rounded-full text-xs font-semibold cursor-pointer border shadow-sm">
                          {images.idFront ? '重拍正面' : '拍攝正面'}
                          <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(e, 'idFront')} />
                        </label>
                      </div>
                      <div className="border border-dashed border-gray-300 rounded-lg p-2 flex flex-col items-center justify-center text-center relative overflow-hidden h-32 bg-gray-50">
                        {images.idBack ? <img src={images.idBack} className="absolute inset-0 w-full h-full object-cover opacity-80" /> : <IconCamera size={24} />}
                        <label className="relative z-10 bg-white/90 px-3 py-1 mt-2 rounded-full text-xs font-semibold cursor-pointer border shadow-sm">
                          {images.idBack ? '重拍反面' : '拍攝反面'}
                          <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(e, 'idBack')} />
                        </label>
                      </div>
                    </div>

                    <div className="mt-4">
                      <div className="border border-gray-300 rounded-lg p-4 flex flex-col items-center justify-center bg-gray-50 h-32 relative">
                        {images.signature ? (
                           <img src={images.signature} className="absolute inset-0 w-full h-full object-contain p-2 mix-blend-multiply" />
                        ) : <p className="text-gray-400 text-sm mb-3">尚未簽名</p>}
                        <button onClick={() => setShowSignature(true)} className="relative z-10 bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-sm">
                          <IconPenTool size={16} /> {images.signature ? '重新簽名' : '點擊此處簽名'}
                        </button>
                      </div>
                    </div>
                  </div>
                </section>

                <div className="pt-4 pb-10">
                  <button onClick={generatePreview} disabled={isGenerating} className={`w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 ${isGenerating ? 'bg-blue-400 text-white cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                    {isGenerating ? <IconLoader size={24} className="animate-spin" /> : <IconFileCheck size={24} />}
                    {isGenerating ? '處理中...' : '產生契約書預覽'}
                  </button>
                </div>
              </div>
            )}

            {step === 2 && previewDataUrl && (
              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
                <div className="w-full flex justify-between items-center mb-4">
                  <h2 className="text-lg font-bold">合約預覽</h2>
                  <button onClick={() => setStep(1)} className="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-1">
                    <IconPenTool size={14}/> 返回修改
                  </button>
                </div>
                
                <div className="border border-gray-200 rounded p-2 bg-gray-50 w-full mb-3 overflow-hidden relative" style={{ minHeight: '300px' }}>
                  <img src={previewDataUrl} alt="契約書預覽" className="w-full h-auto rounded shadow-sm" />
                </div>
                <p className="text-xs text-red-500 mb-6 font-bold">* 提示：若按鈕無反應，請直接「長按上方圖片」儲存。</p>

                <div className="flex gap-3 w-full">
                  <button onClick={handleDownloadClick} className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg flex items-center justify-center gap-1">
                    <IconDownload size={20} /> 下載 JPG
                  </button>
                  <button onClick={() => setShowResetConfirm(true)} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg flex items-center justify-center gap-1">
                    <IconCheckCircle size={20} /> 完成回收
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* 確認重置視窗 */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white rounded-xl w-full max-w-sm overflow-hidden flex flex-col shadow-2xl p-6 text-center">
                <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4">
                  <IconCheckCircle size={24} className="text-blue-600" />
                </div>
                <h3 className="font-bold text-lg mb-2">確定完成回收？</h3>
                <p className="text-gray-500 text-sm mb-6">這將會清空您剛剛輸入的客戶資料（店名會保留）。</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-lg font-semibold">取消</button>
                  <button onClick={executeReset} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-semibold">確定清空</button>
                </div>
              </div>
            </div>
          )}

          {/* 掃描條碼模態框：直接啟動後鏡頭 */}
          {showScanner && (
            <BarcodeScannerModal 
              onScan={(result) => { setFormData(prev => ({ ...prev, imei: result })); setShowScanner(false); }}
              onClose={() => setShowScanner(false)}
            />
          )}

          {/* 橫向簽名板模態框 */}
          {showSignature && (
            <SignatureModal 
              onSave={(dataUrl) => { setImages(prev => ({ ...prev, signature: dataUrl })); setShowSignature(false); }}
              onClose={() => setShowSignature(false)}
            />
          )}
        </div>
      );
    }

    function BarcodeScannerModal({ onScan, onClose }) {
      const scannerRef = useRef(null);
      const [errorMsg, setErrorMsg] = useState("");

      useEffect(() => {
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const isSecure = window.location.protocol === 'https:' || isLocalhost || window.location.protocol === 'file:';
        if (!isSecure) {
          setErrorMsg("⚠️ 請使用 HTTPS 或本機環境開啟網頁，否則無法啟動相機。");
          return;
        }

        const loadHtml5Qrcode = async () => {
          try {
            if (!window.Html5Qrcode) {
              const script = document.createElement('script');
              script.src = "https://unpkg.com/html5-qrcode";
              script.async = true;
              document.body.appendChild(script);
              await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; });
            }

            const html5QrCode = new window.Html5Qrcode("reader");
            scannerRef.current = html5QrCode;

            html5QrCode.start(
              { facingMode: "environment" },
              { fps: 10, qrbox: { width: 250, height: 150 } },
              (decodedText) => {
                if(scannerRef.current) scannerRef.current.stop().catch(console.error);
                onScan(decodedText);
              },
              (errorMessage) => { }
            ).catch((err) => {
              setErrorMsg("相機啟動失敗，請確認已允許網頁取用相機權限。");
            });
          } catch (err) {
            setErrorMsg("載入掃描套件失敗！");
          }
        };

        loadHtml5Qrcode();

        return () => {
          if (scannerRef.current && scannerRef.current.isScanning) {
            scannerRef.current.stop().catch(console.error);
          }
        };
      }, [onScan]);

      return (
        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
          <div className="bg-white rounded-xl w-full max-w-md overflow-hidden flex flex-col">
            <div className="p-4 flex justify-between items-center bg-gray-50 border-b">
              <h3 className="font-bold">掃描 IMEI 條碼</h3>
              <button onClick={onClose} className="p-1 text-gray-500 hover:text-gray-800"><IconX size={24} /></button>
            </div>
            {errorMsg && (
              <div className="bg-red-50 p-3 text-red-600 text-sm flex gap-2 items-start border-b border-red-100">
                <IconAlertTriangle size={16} /> <p>{errorMsg}</p>
              </div>
            )}
            <div className="relative bg-black h-[400px] flex items-center justify-center overflow-hidden">
              <div id="reader" className="w-full text-white bg-black"></div>
            </div>
            <div className="p-4 bg-gray-50 text-center text-sm text-gray-500 font-medium">
              請將鏡頭對準手機外盒上的 IMEI 條碼<br/>(系統已自動開啟相機)
            </div>
          </div>
        </div>
      );
    }

    function SignatureModal({ onSave, onClose }) {
      const canvasRef = useRef(null);
      const containerRef = useRef(null);

      useEffect(() => {
        document.body.classList.add('modal-open');
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;

        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#000000';

        return () => document.body.classList.remove('modal-open');
      }, []);

      const getCoordinates = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        }
        return { x: clientX - rect.left, y: clientY - rect.top };
      };

      const startDrawing = (e) => {
        e.preventDefault();
        const ctx = canvasRef.current.getContext('2d');
        const { x, y } = getCoordinates(e);
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const draw = (e) => {
        e.preventDefault();
        if (e.buttons !== 1 && !e.touches) return;
        const ctx = canvasRef.current.getContext('2d');
        const { x, y } = getCoordinates(e);
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      };

      return (
        <div className="fixed inset-0 z-[100] bg-gray-200 flex flex-col">
          <div className="flex justify-between items-center p-4 bg-white shadow-sm z-10">
            <button onClick={onClose} className="text-red-500 font-bold px-4 py-2 bg-red-50 rounded-lg">取消</button>
            <div className="text-center">
              <span className="font-bold text-gray-800 text-lg block">請在下方簽名</span>
              <span className="text-blue-600 text-sm">💡 建議橫轉手機畫面更大</span>
            </div>
            <button onClick={() => onSave(canvasRef.current.toDataURL('image/png'))} className="text-white font-bold px-4 py-2 bg-blue-600 rounded-lg shadow-sm">完成儲存</button>
          </div>
          
          <div ref={containerRef} className="flex-grow relative bg-white m-2 rounded-xl shadow-inner border-2 border-gray-300 overflow-hidden touch-none">
            <canvas
              ref={canvasRef}
              className="absolute inset-0 w-full h-full touch-none cursor-crosshair"
              onMouseDown={startDrawing} onMouseMove={draw}
              onTouchStart={startDrawing} onTouchMove={draw}
            />
          </div>

          <div className="p-3 bg-white text-center shadow-sm">
            <button onClick={clearCanvas} className="px-6 py-2 bg-gray-100 text-gray-600 font-bold rounded-full border border-gray-300">
              清除重簽
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
